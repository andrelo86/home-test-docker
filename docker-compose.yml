services:
  demo-app:
    image: automaticbytes/demo-app
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100"]
      interval: 5s
      timeout: 5s
      retries: 5

  tests:
    build: .
    depends_on:
      demo-app:
        condition: service_healthy
    environment:
      - BASE_URL=http://demo-app:3100
    volumes:
      - ./test-results:/app/target/surefire-reports
